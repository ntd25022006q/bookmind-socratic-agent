services:
  - type: web
    name: bookmind-socratic-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --server
    envVars:
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        value: https://ollama.com/v1
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://ollama.com/v1
